name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - goarch: amd64
            suffix: amd64
          - goarch: arm64
            suffix: arm64
          - goarch: arm
            goarm: "7"
            suffix: armv7
          - goarch: arm
            goarm: "6"
            suffix: armv6
          - goarch: "386"
            suffix: "386"
          - goarch: riscv64
            suffix: riscv64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          go build -ldflags="-s -w -X main.version=$VERSION" \
            -o kde-notify-status-monitor-linux-${{ matrix.suffix }} .

      - uses: softprops/action-gh-release@v2
        with:
          files: kde-notify-status-monitor-linux-${{ matrix.suffix }}
          generate_release_notes: true
