name: Build

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            suffix: amd64
          - goarch: arm64
            suffix: arm64
          - goarch: arm
            goarm: "7"
            suffix: armv7
          - goarch: arm
            goarm: "6"
            suffix: armv6
          - goarch: "386"
            suffix: "386"
          - goarch: riscv64
            suffix: riscv64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w" \
            -o kde-notify-status-monitor-linux-${{ matrix.suffix }} .

      - uses: actions/upload-artifact@v4
        with:
          name: kde-notify-status-monitor-linux-${{ matrix.suffix }}
          path: kde-notify-status-monitor-linux-${{ matrix.suffix }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
